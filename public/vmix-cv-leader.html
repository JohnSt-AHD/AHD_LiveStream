<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
    <title>vMix — CV Leader Line</title>
    <link rel="stylesheet" href="vmix-cv-leader.css">
</head>
<body>
    <div class="cv-stage" aria-label="Computer vision leader line overlay">
        <div class="cv-status-dot" id="cvStatusDot" title="CV link status"></div>
        <p class="cv-error" id="cvError" hidden></p>
        <div class="cv-dev-label">CV leader · 1920×1080</div>
        <div class="cv-leader-line" id="cvLeaderLine" hidden aria-hidden="true"></div>
    </div>
    <script src="cv-position-client.js"></script>
</body>
</html>
