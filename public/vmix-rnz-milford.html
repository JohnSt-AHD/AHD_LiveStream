<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
    <title>vMix — RNZ Milford</title>
    <link rel="stylesheet" href="vmix-graphics.css">
    <link rel="stylesheet" href="vmix-layout-editor.css">
</head>
<body class="vmix-page" data-vmix-theme="rnz-milford">
    <div class="vg-stage">
        <div class="vg-bg" id="vgBg" aria-hidden="true"></div>
        <div class="vg-map-wrap" id="vgMapWrap">
            <iframe class="vg-map-frame" id="vgMapFrame" title="Altitude HD speed overlay"></iframe>
        </div>
        <div class="vg-layer" id="vgLayer"></div>
        <p class="vg-error" id="vgError" hidden></p>
    </div>
    <script src="hub-csv.js"></script>
    <script src="vmix-layout.js"></script>
    <script src="vmix-graphics.js"></script>
    <script src="vmix-layout-editor.js"></script>
</body>
</html>
