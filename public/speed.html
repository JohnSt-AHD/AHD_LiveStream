<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live speed</title>
    <link rel="stylesheet" href="speed.css">
</head>
<body>
    <!-- WebM VP9 + alpha first (Chrome / vMix Web Browser); ProRes .mov fallback (e.g. Safari). -->
    <div class="speed-bg-video-wrap" aria-hidden="true">
        <video
            id="speedBgVideo"
            class="speed-bg-video"
            muted
            playsinline
            webkit-playsinline
            preload="auto"
            disablePictureInPicture
        >
            <source src="speed-race-background.webm" type="video/webm">
            <source src="speed-race-background.mov" type="video/quicktime">
        </video>
    </div>
    <div id="speedRouteLayer" class="speed-route-layer" hidden aria-hidden="true">
        <svg class="speed-route-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <line id="speedRouteLine" class="speed-route-line" x1="0" y1="0" x2="0" y2="0" />
            <circle id="speedRouteMarkerStart" class="speed-route-marker speed-route-marker--start" r="0.9" cx="0" cy="0" />
            <circle id="speedRouteMarkerEnd" class="speed-route-marker speed-route-marker--end" r="0.9" cx="0" cy="0" />
            <circle id="speedRouteDeviceDot" class="speed-route-device-dot" r="1.15" cx="0" cy="0" />
        </svg>
    </div>
    <div id="speedError" class="speed-page-error" hidden></div>
    <div id="speedCard" class="speed-card" hidden>
        <div class="speed-card-value" id="scSplit">—</div>
    </div>
    <script src="speed.js"></script>
</body>
</html>
