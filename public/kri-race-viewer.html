<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>KRI — Race viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="data/kri-sample-wrcp1-m1x-h1.json" as="fetch" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700;800&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700;800&display=swap"></noscript>
    <link rel="stylesheet" href="kri-race-viewer.css">
</head>
<body class="kri-race-viewer-page">
    <div class="krv-stage" id="krvStage">
        <header class="krv-titlebar">
            <img class="krv-titlebar__logo" src="assets/kri/kri-logo.png" alt="" width="36" height="36">
            <h1 class="krv-titlebar__title">Live Race Viewer</h1>
        </header>
        <div class="krv-overview__race-labels" id="krvOverviewRaceLabels" aria-hidden="true"></div>
        <section class="krv-overview" aria-label="Course overview">
            <div class="krv-water-stack">
                <canvas class="krv-water-canvas" id="krvOverviewWater" aria-hidden="true"></canvas>
                <svg class="krv-overview__svg" id="krvOverviewSvg" viewBox="0 0 1800 220" preserveAspectRatio="none"></svg>
            </div>
        </section>
        <div class="krv-main">
            <aside class="krv-upcoming" aria-label="Upcoming races">
                <details class="krv-panel-collapse" open>
                    <summary class="krv-panel-collapse__summary krv-upcoming__title">Upcoming</summary>
                    <ul class="krv-upcoming__list" id="krvUpcomingList"></ul>
                </details>
            </aside>
            <section class="krv-zoom" aria-label="Race close-up">
                <h2 class="krv-zoom__race-title" id="krvZoomRaceTitle" hidden></h2>
                <div class="krv-zoom__race-picker" id="krvZoomRacePicker" role="tablist" aria-label="Select race for zoom" hidden></div>
                <div class="krv-zoom__viewport">
                    <div class="krv-water-stack">
                        <canvas class="krv-water-canvas" id="krvZoomWater" aria-hidden="true"></canvas>
                        <svg class="krv-zoom__svg" id="krvZoomSvg" viewBox="0 0 1200 520" preserveAspectRatio="none"></svg>
                    </div>
                    <div class="krv-zoom__boats" id="krvZoomBoats"></div>
                    <div class="krv-zoom__lane-badges" id="krvZoomLaneBadges" aria-hidden="true"></div>
                    <div class="krv-zoom__splits" id="krvZoomSplits" aria-hidden="true"></div>
                    <div class="krv-live-results" id="krvLiveResults" hidden aria-live="polite">
                        <div class="krv-live-results__panel">
                            <img class="krv-live-results__mark" src="assets/kri/kri-logo.png" alt="">
                            <header class="krv-live-results__head">
                                <p class="krv-live-results__kicker">Results</p>
                                <h3 class="krv-live-results__title" id="krvLiveResultsTitle"></h3>
                                <p class="krv-live-results__meta" id="krvLiveResultsMeta"></p>
                            </header>
                            <div class="krv-live-results__body">
                                <div class="krv-live-results__cols" aria-hidden="true">
                                    <span class="krv-live-results__col krv-live-results__col--place">Placing</span>
                                    <span class="krv-live-results__col krv-live-results__col--crew">Crew</span>
                                    <span class="krv-live-results__col krv-live-results__col--time">Time</span>
                                </div>
                                <ul class="krv-live-results__list" id="krvLiveResultsList"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <aside class="krv-previous" aria-label="Previous race results">
                <details class="krv-panel-collapse" open>
                    <summary class="krv-panel-collapse__summary krv-previous__title">Previous</summary>
                    <p class="krv-previous__meta" id="krvPreviousMeta">—</p>
                    <ul class="krv-previous__list" id="krvPreviousList"></ul>
                </details>
            </aside>
        </div>
        <p class="krv-status" id="krvStatus" hidden></p>
    </div>
    <script src="hub-csv.js"></script>
    <script src="hub-live-race.js"></script>
    <script src="vmix-kri-speed-chart.js"></script>
    <script src="kri-race-viewer.js"></script>
</body>
</html>
