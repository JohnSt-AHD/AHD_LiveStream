<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traccar Overlay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="overlay-panel">
            <div class="header">
                <h1>Vehicle Tracking</h1>
            </div>
            
            <div class="devices-container" id="devicesContainer">
                <div class="loading">Loading device data...</div>
            </div>
            
            <div class="footer">
                <span class="last-update" id="lastUpdate">Last updated: --:--:--</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
